services:
  neo4j:
    image: neo4j:5.26-community
    container_name: zerofin-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/changeme123
      - NEO4J_server_memory_heap_initial__size=1g
      - NEO4J_server_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  postgres:
    image: postgres:17
    container_name: zerofin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=zerofin
      - POSTGRES_USER=zerofin
      - POSTGRES_PASSWORD=changeme123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: zerofin-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
